name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PNPM_VERSION: "9.15.4"

jobs:
  pre-commit:
    name: pre-commit (lint+format)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - uses: pre-commit/action@v3.0.1
  frontend:
    name: frontend (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - name: Install JS deps
        run: pnpm install --frozen-lockfile
      - name: svelte-check (types)
        run: pnpm --filter desktop check
      - name: vitest (unit)
        shell: bash
        run: |
          if find apps/desktop/src -type f \( -name "*.test.*" -o -name "*.spec.*" \) | grep -q .; then
            pnpm --filter desktop test:unit:run
          else
            echo "No frontend tests yet — skipping vitest"
          fi

  backend:
    name: backend (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: services/backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: services/backend/uv.lock
      - name: Install Python deps
        run: uv sync
      - name: mypy (types)
        run: uv run mypy
      - name: pytest (unit)
        shell: bash
        run: |
          if find . -type f \( -name "test_*.py" -o -name "*_test.py" \) -not -path "./.venv/*" | grep -q .; then
            uv run pytest
          else
            echo "No backend tests yet — skipping pytest"
          fi

  tauri:
    name: tauri (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri
      - name: Install Linux Tauri deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libfuse2 \
            file
      - name: Install JS deps
        run: pnpm install --frozen-lockfile
      - name: cargo fmt --check
        working-directory: apps/desktop/src-tauri
        run: cargo fmt --all -- --check
      - name: cargo clippy
        working-directory: apps/desktop/src-tauri
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: cargo test
        working-directory: apps/desktop/src-tauri
        run: cargo test --all-features
      - name: tauri build
        working-directory: apps/desktop
        run: pnpm exec tauri build
